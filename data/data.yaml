# =============================================================================
# ROSTER & GEAR INVENTORY
# =============================================================================
# HOW TO USE:
#   Characters need: name, damage_type (ATK / MATK / Max HP), atk, crit_dmg,
#                    ratio_per_hit, hits
#   Optional:        buffs, temp_buffs  (omit entirely if not needed)
#
#   buffs is a LIST of single-key entries — this allows the same buff type
#   more than once (e.g. two separate ATK% buffs from one character).
#   Each entry counts as one buff for NH Nebris's ratio_per_hit calculation.
#
#     buffs:
#       - ATK%: 0.6      ← first buff
#       - ATK%: 0.5      ← second buff (same type, both counted separately)
#
#   temp_buffs is a MAPPING (dict) — per-character self-buffs, no duplicates:
#
#     temp_buffs:
#       ATK%: 0.5
#
#   Gear needs: name, slot (weapon / head / armor / accessory / glove)
#   Optional stat fields (omit if 0): flat_atk, flat_matk, atk_percent,
#                                     matk_percent, crit_dmg, exclusive_for
# =============================================================================


