# =============================================================================
# GEAR POOL
# =============================================================================
# Three construction modes are supported. The loader picks the mode by which
# keys are present in each entry.
#
# ── MODE 1: preset ────────────────────────────────────────────────────────────
# Uses Gear.from_preset(). Name and slot come from the preset definition.
# All preset gear is UR rarity. Preset shorthand is case-insensitive.
#
#   - preset: EDB           # shorthand or full name (see list below)
#     rank: 5               # 1–5
#     refine: 19            # 0–24
#     secondary_stats:      # optional; max count depends on refine level:
#       - crit_dmg          #   0–2  → 0 secondaries
#       - atk_percent       #   3–5  → 1 secondary
#     exclusive_for: "Wilhelmina"   # optional; gear must be rank 5
#
# Available presets (shorthand / full name → slot, primary stats):
#   EDB  / Evil Dragon's Blade       → weapon,    flat_atk + crit_dmg
#   HoT  / Hammer of Thunder         → weapon,    flat_atk + atk_percent
#   TGF  / Travel God's Friend       → weapon,    flat_matk + crit_dmg
#   EoD  / Eye of the Destroyer      → weapon,    flat_matk + matk_percent
#   VT   / Venomous Touch            → accessory, crit_dmg × 2
#   PA   / Prime Authority           → glove,     flat_atk + atk_percent
#   DSP  / Dragon Scale's Protection → glove,     flat_matk + matk_percent
#   GKSA / God-King's Silver Arm     → glove,     atk_percent × 2
#   SoT  / Shackle of Treachery      → glove,     matk_percent × 2
#
# ── MODE 2: from_rarity ───────────────────────────────────────────────────────
# Uses Gear.from_rarity(). Stat values are calculated from the game tables.
# Use this for non-preset named gear where you know the exact parameters.
#
#   - name: "My Custom Sword"
#     slot: weapon          # weapon / head / armor / accessory / glove
#     rarity: UR            # UR / SR / R
#     rank: 4               # 1–5
#     refine: 15            # 0–24
#     primary_stats:        # exactly 2, from:
#       - flat_atk          #   flat_atk, flat_matk, atk_percent, matk_percent,
#       - crit_dmg          #   flat_hp, hp_percent, crit_rate, crit_dmg
#     secondary_stats:      # optional, up to 3 (same stat pool as primary)
#       - atk_percent
#     exclusive_for: null   # optional
#
# ── MODE 3: raw (pre-computed stats) ─────────────────────────────────────────
# Uses Gear() directly. Provide the final numeric values yourself.
# Use this when you've already calculated stats or they don't fit the tables.
#
#   - name: "Custom Piece"
#     slot: head
#     flat_atk: 0           # all stat fields are optional; omit if 0
#     flat_matk: 0
#     atk_percent: 0.072
#     matk_percent: 0
#     crit_dmg: 0.144
#     exclusive_for: null
# =============================================================================

